<!DOCTYPE html> 
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Главная Страница</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <header>
        <div class="To-Do">
            <h2 class="To">To-Do</h2>           
        </div>
    </header>
    <div class="container">
    <p class="create">Создать заметку</p>
    <p class="fil">Отфильтровать </p>
    <p class="themes">Поменять тему</p>
    <p class="sett">Настройки</p>
    </div>
    <hr class="line">
    <div class="create-container">
        <form>
            <input placeholder="Название заметки" class='name'>
            <p>
            <input placeholder="Описание заметки" class="description">
            </p>
            <p class="to-do-time-container">
            <label class="to-do-time" type="date">Срок</label>
            <input type="datetime-local" class="time" Срок>
            </p>
        </form>
    </div>
<script link="main.js"></script>    
</body>
</html>
