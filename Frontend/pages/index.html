<!DOCTYPE html> 
<html>
<head>
    <meta charset="UTF-8"> 
    <meta http-equiv="X-UA-Compatible" content="IE=edge"> 
    <title>Главная страница</title> 
    <link rel="stylesheet" href="/static/index.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
</head>
<body>
<header class="header">To-Do</header>
<div class="main-container">
    <div class="create-container">
        <span class="create"><svg xmlns="http://www.w3.org/2000/svg" class="create-icon" fill="currentColor" width="24" height="24" viewBox="0 0 24 24"><path d="M12 0c-6.627 0-12 5.373-12 12s5.373 12 12 12 12-5.373 12-12-5.373-12-12-12zm6 13h-5v5h-2v-5h-5v-2h5v-5h2v5h5v2z"/></svg>Добавить заметку</span>
    </div>
    <div class="filter-container"> 
        <span class="filter"><svg width="24" height="24" viewBox="0 0 24 24" class="filter-icon" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
</svg>Отфильтровать</span>
    </div>
    <div class="sett-btn-cont">
        <span class="sett-btn"> <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="sett-icon"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            Настройки</span>
    </div>
</div>
<div class="todo-container">
    <textarea class="todo-title" placeholder="Название"></textarea>
    <textarea class="todo-description" placeholder="Описание"></textarea>
        <div class="buttons-container">
            <span class="data-container">
            <div class="data-input"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 16 16" class="data-icon" aria-hidden="true"><path fill="#bbb7b7" d="M12 2a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2zm0 1H4a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V4a1 1 0 0 0-1-1m-1.25 7a.75.75 0 1 1 0 1.5.75.75 0 0 1 0-1.5m.75-5a.5.5 0 1 1 0 1h-7a.5.5 0 0 1 0-1z"></path></svg>Срок</div>
            </span>
            <span class="priority-container">
                <div class="priority-input"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 16 16" class="priority-icon"  ><path fill="#bbb7b7"  d="M2 3a.5.5 0 0 1 .276-.447C3.025 2.179 4.096 2 5.5 2c.901 0 1.485.135 2.658.526C9.235 2.885 9.735 3 10.5 3c1.263 0 2.192-.155 2.776-.447A.5.5 0 0 1 14 3v6.5a.5.5 0 0 1-.276.447c-.749.375-1.82.553-3.224.553-.901 0-1.485-.135-2.658-.526C6.765 9.615 6.265 9.5 5.5 9.5c-1.08 0-1.915.113-2.5.329V13.5a.5.5 0 0 1-1 0V3m1 5.779v-5.45C3.585 3.113 4.42 3 5.5 3c.765 0 1.265.115 2.342.474C9.015 3.865 9.599 4 10.5 4c1.002 0 1.834-.09 2.5-.279v5.45c-.585.216-1.42.329-2.5.329-.765 0-1.265-.115-2.342-.474C6.985 8.635 6.401 8.5 5.5 8.5c-1.001 0-1.834.09-2.5.279" clip-rule="evenodd"></path></svg>Приоритет</div>
            </span>
        </div>
            <div class="select-priority-container">
                <div class="high-priority"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" class="high-priority-icon" data-icon-name="priority-icon" data-priority="1"><path fill="indianred" fill-rule="evenodd" d="M4.223 4.584A.5.5 0 0 0 4 5v14.5a.5.5 0 0 0 1 0v-5.723C5.886 13.262 7.05 13 8.5 13c.97 0 1.704.178 3.342.724 1.737.58 2.545.776 3.658.776 1.759 0 3.187-.357 4.277-1.084A.5.5 0 0 0 20 13V4.5a.5.5 0 0 0-.777-.416C18.313 4.69 17.075 5 15.5 5c-.97 0-1.704-.178-3.342-.724C10.421 3.696 9.613 3.5 8.5 3.5c-1.758 0-3.187.357-4.277 1.084" clip-rule="evenodd"></path></svg>Высокий</div>
                <div class="mid-priority"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" class="mid-priority-icon" data-icon-name="priority-icon" data-priority="2"><path fill="khaki" fill-rule="evenodd" d="M4.223 4.584A.5.5 0 0 0 4 5v14.5a.5.5 0 0 0 1 0v-5.723C5.886 13.262 7.05 13 8.5 13c.97 0 1.704.178 3.342.724 1.737.58 2.545.776 3.658.776 1.759 0 3.187-.357 4.277-1.084A.5.5 0 0 0 20 13V4.5a.5.5 0 0 0-.777-.416C18.313 4.69 17.075 5 15.5 5c-.97 0-1.704-.178-3.342-.724C10.421 3.696 9.613 3.5 8.5 3.5c-1.758 0-3.187.357-4.277 1.084" clip-rule="evenodd"></path></svg>Средний</div>
                <div class="low-priority"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" class="low-priority-icon" data-icon-name="priority-icon" data-priority="3"><path fill="lightgreen" fill-rule="evenodd" d="M4.223 4.584A.5.5 0 0 0 4 5v14.5a.5.5 0 0 0 1 0v-5.723C5.886 13.262 7.05 13 8.5 13c.97 0 1.704.178 3.342.724 1.737.58 2.545.776 3.658.776 1.759 0 3.187-.357 4.277-1.084A.5.5 0 0 0 20 13V4.5a.5.5 0 0 0-.777-.416C18.313 4.69 17.075 5 15.5 5c-.97 0-1.704-.178-3.342-.724C10.421 3.696 9.613 3.5 8.5 3.5c-1.758 0-3.187.357-4.277 1.084" clip-rule="evenodd"></path></svg>Низкий</div>
            </div>
        <span class="close-add-container">
<span class="close-container">
    <div class="close-todo">Отмена</div>
</span> 
    <span class="add-container">
        <div class="add-todo">Создать заметку</div>
    </span>
</span>
    <div class="close-war-container">
        <header class="close-war">
                <p class="war-text">Удалить несохраненные изменения?</p> 
                <p class="second-war-text">Несохранненые изменения будут удалены</p> 
            <footer class="war-buttons"> 
                <button class="war-cancel">Отмена</button>
                <button class="war-confirm">Удалить</button>
            </footer>
        </header>
    </div>
</div>
<div class="notes-list"></div>
<div class="settings-container">
    <h2>Настройки профиля</h2>
    <form id="settingsForm">
        <div class="form-group">
                <label for="username">Новый логин</label>
                <input type="text" id="username" placeholder="Текущий: alex_concept">
            </div>
            <div class="form-group">
                <label for="email">Новая почта</label>
                <input type="email" id="email" placeholder="Текущая: alex@example.com">
            </div>
            <hr class="divider">
            <div class="form-group">
                <label for="currentPassword">Текущий пароль <span class="required"></span></label>
                <input type="password" id="currentPassword" required placeholder="Введите старый пароль">
            </div>
            <div class="form-group">
                <label for="newPassword">Новый пароль</label>
                <input type="password" id="newPassword" placeholder="Минимум 16 символов">
            </div>
        <button type="submit" class="save-btn">Сохранить изменения</button>
    </form>
<div id="message" class="message-box hidden"></div>
</div>
<script src="/static/index.js" defer></script>
</body>    
</html>
